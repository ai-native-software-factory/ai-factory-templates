name: flutter_app
description: A production-ready Flutter application template.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0

  # Data Classes & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI Components
  fl_chart: ^0.66.0
  flutter_screenutil: ^5.9.0
  lottie: ^3.0.0
  webview_flutter: ^4.4.2

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Permissions
  permission_handler: ^11.2.0

  # Audio
  audioplayers: ^5.2.1

  # Utilities
  equatable: ^2.0.5
  collection: ^1.18.0
  intl: ^0.19.0
  logger: ^2.0.2
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
